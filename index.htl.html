<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 04 - Navigation Bars</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #e0e0e0; /* Light gray page background as shown in preview */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 30px; /* Spacing between the three navigation bars */
      padding: 40px 20px;
    }

    /* Container for navigation bars to limit maximum width */
    .nav-wrapper {
      width: 100%;
      max-width: 850px;
    }

    /* Navigation Bar Base Styles */
    .navbar {
      background-color: #0d0d0d; /* Deep black background */
      border-radius: 50px; /* Fully rounded pill shape */
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    /* Left Side: Logo */
    .logo {
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
    }

    /* Right Side: Menu Items Wrapper */
    .nav-menu {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 24px; /* Space between links */
    }

    /* Navigation Link Styles */
    .nav-link {
      color: #ffffff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 6px 0;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: #ccff00; /* Subtle hover color change */
    }

    /* State 2 (Middle Bar): Active/Underlined Link Style */
    .nav-link.active-underline {
      border-bottom: 2px solid #ffffff;
    }

    /* "Contact us" Pill Button Styles */
    .btn-contact {
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: bold;
      padding: 10px 22px;
      border-radius: 30px;
      transition: all 0.2s ease;
    }

    /* Accent-Colored Button Theme (Yellow-Green) */
    .btn-accent {
      background-color: #ccff00; /* Vibrant yellow-green from the mockup */
      color: #000000;
    }

    .btn-accent:hover {
      background-color: #b5e600;
    }

    /* Dark/Bordered Button Theme (Bottom Bar) */
    .btn-outline {
      background-color: transparent;
      color: #ffffff;
      border: 1.5px solid #ffffff;
    }

    .btn-outline:hover {
      background-color: #ffffff;
      color: #0d0d0d;
    }

    /* Responsive adjustments for mobile screens */
    @media (max-width: 600px) {
      .navbar {
        height: auto;
        flex-direction: column;
        border-radius: 20px;
        padding: 20px;
        gap: 15px;
      }

      .nav-menu {
        flex-direction: column;
        gap: 12px;
        width: 100%;
        text-align: center;
      }

      .btn-contact {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- ==================== VARIATION 1 (Top) ==================== -->
  <div class="nav-wrapper">
    <nav class="navbar">
      <a href="#" class="logo">Logo</a>
      <ul class="nav-menu">
        <li><a href="#" class="nav-link">About us</a></li>
        <li><a href="#" class="nav-link">Portfolio</a></li>
        <li><a href="#" class="nav-link">Services</a></li>
        <li><a href="#" class="btn-contact btn-accent">Contact us</a></li>
      </ul>
    </nav>
  </div>

  <!-- ==================== VARIATION 2 (Middle with Underline) ==================== -->
  <div class="nav-wrapper">
    <nav class="navbar">
      <a href="#" class="logo">Logo</a>
      <ul class="nav-menu">
        <li><a href="#" class="nav-link active-underline">About us</a></li>
        <li><a href="#" class="nav-link">Portfolio</a></li>
        <li><a href="#" class="nav-link">Services</a></li>
        <li><a href="#" class="btn-contact btn-accent">Contact us</a></li>
      </ul>
    </nav>
  </div>

  <!-- ==================== VARIATION 3 (Bottom with Outlined Button) ==================== -->
  <div class="nav-wrapper">
    <nav class="navbar">
      <a href="#" class="logo">Logo</a>
      <ul class="nav-menu">
        <li><a href="#" class="nav-link">About us</a></li>
        <li><a href="#" class="nav-link">Portfolio</a></li>
        <li><a href="#" class="nav-link">Services</a></li>
        <li><a href="#" class="btn-contact btn-outline">Contact us</a></li>
      </ul>
    </nav>
  </div>

</body>
</html>
</body>
</html>
